# .github/workflows/start-server.yml
name: Start Minecraft Server
on:
  workflow_dispatch:  # Manual trigger only
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours

jobs:
  start-server:
    runs-on: ubuntu-22.04
    timeout-minutes: 345  # ~5.75 hours
    
    steps:
      # Checkout repository with all existing files
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.FINE_GRAINED_PAT }}
      
      # Verify all required files exist in repo
      - name: Verify existing files
        run: |
          echo "📁 Checking repository contents..."
          
          # Check for essential files
          REQUIRED_FILES=(
            "spigot.jar"
            "playit-linux-amd64"
            "server.properties"
            "bukkit.yml"
            "spigot.yml"
            "paper.yml"
          )
          
          MISSING=0
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ Found: $file"
            else
              echo "❌ Missing: $file"
              MISSING=1
            fi
          done
          
          # Check for world data
          if [ -d "world" ]; then
            echo "✅ Found world data"
          else
            echo "⚠️ No world directory found - will create new"
          fi
          
          # Check for plugins
          if [ -d "plugins" ] && [ "$(ls -A plugins)" ]; then
            echo "✅ Found $(ls -1 plugins/*.jar 2>/dev/null | wc -l) plugins"
          else
            echo "⚠️ No plugins found"
          fi
          
          if [ $MISSING -eq 1 ]; then
            echo "❌ Some required files are missing!"
            exit 1
          fi
      
      # Setup Java (only download JDK, not server files)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # Make playit executable
      # Configure git for auto-save (using existing PAT)
      - name: Configure Git
        run: |
          git config --global user.name "Minecraft Server Bot"
          git config --global user.email "minecraft-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.FINE_GRAINED_PAT }}@github.com/${{ github.repository }}.git
          echo "✅ Git configured with PAT"
      
      # Create save script (using repo's existing paths)
      - name: Create save script
        run: |
          # write script to file (strips leading indentation so heredoc can be indented in YAML)
          cat <<'EOF' | awk '{sub(/^[ \t]+/,""); print}' > save-world.sh
              #!/bin/bash
              set -euo pipefail

              SAVE_REASON="${1:-MANUAL}"
              TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
              
              echo ""
              echo "=========================================="
              echo "💾 SAVING WORLD - $SAVE_REASON"
              echo "=========================================="

              # ensure we run from repo root if this is a git repo, otherwise use current dir
              REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || echo .)"
              cd "$REPO_ROOT"

              SUSPENDED_SAVE=0

              # If server.stdin named pipe exists, pause server autosaves to avoid race conditions
              if [ -p server.stdin ]; then
                echo "❗ Asking server to pause saves..."
                echo "save-off" > server.stdin   # stop autosaves
                # flush the world to disk
                echo "save-all" > server.stdin
                sleep 2
                SUSPENDED_SAVE=1
              else
                echo "⚠️ server.stdin pipe not found; proceeding without save lock"
              fi

              # Stage everything (recursive). -A covers additions, modifications and deletions.
              git add -A

              # If nothing staged -> show debug info and exit cleanly
              if git diff --staged --quiet; then
                echo "ℹ️ No staged changes detected."

                echo ""
                echo "---- git status (porcelain) ----"
                git status --porcelain || true

                echo "---- Untracked (not ignored) ----"
                git ls-files -o --exclude-standard || true

                echo "---- Top-level .gitignore (if present) ----"
                [ -f .gitignore ] && sed -n '1,200p' .gitignore || echo "(no .gitignore)"

                # Re-enable saving if we paused it
                if [ "$SUSPENDED_SAVE" -eq 1 ]; then
                  echo "save-on" > server.stdin
                  echo "✅ Server saves re-enabled"
                fi

                echo "✅ Nothing to commit"
                exit 0
              fi

              COMMIT_MSG="Auto-save: $SAVE_REASON at $TIMESTAMP [skip ci]"

              if git commit -m "$COMMIT_MSG"; then
                echo "✅ Committed changes: $COMMIT_MSG"
              else
                echo "❌ Commit failed. Showing git status:"
                git status || true
                # re-enable saving before exiting
                if [ "$SUSPENDED_SAVE" -eq 1 ]; then
                  echo "save-on" > server.stdin
                fi
                exit 1
              fi

              # Pull with rebase to reduce merge commits; if it fails we still try to push (will fail on conflicts)
              set +e
              git pull --rebase origin main
              PULL_RC=$?
              set -e

              if [ $PULL_RC -ne 0 ]; then
                echo "⚠️ git pull returned non-zero ($PULL_RC). There may be remote changes. Attempting to push anyway."
              fi

              if git push origin main; then
                echo "✅ Changes pushed to repository"
              else
                echo "❌ git push failed. Showing remote info:"
                git remote -v || true
                # re-enable saving before exit
                if [ "$SUSPENDED_SAVE" -eq 1 ]; then
                  echo "save-on" > server.stdin
                fi
                exit 1
              fi

              # Re-enable server saving if we paused it
              if [ "$SUSPENDED_SAVE" -eq 1 ]; then
                echo "save-on" > server.stdin
                echo "✅ Server saves re-enabled"
              fi

              echo "✅ Save completed"
          EOF

          chmod +x save-world.sh
      
      # Configure playit with secret
      - name: Start Minecraft Server
        run: |
          # Create named pipe for server commands
          mkfifo server.stdin
          
          # Start playit tunnel
          echo "Starting playit tunnel..."
          ./playit-linux-amd64 > playit.log 2>&1 &
          PLAYIT_PID=$!
          sleep 5
          
          # Display connection info
          echo ""
          echo "=========================================="
          echo "🎮 MINECRAFT SERVER STARTING"
          echo "=========================================="
          echo ""
          echo "🌐 Playit Dashboard: https://playit.gg/account/tunnels"
          echo "📁 Using existing world from repository"
          echo "🔌 Using existing plugins from repository"
          echo "⚙️ Using existing server.properties"
          echo ""
          echo "⏱️ Server will run for ~5 hours"
          echo "=========================================="
          echo ""
          
          # Calculate memory
          AVAILABLE_MEM=$(free -g | awk '/^Mem:/{print $2}')
          HEAP_SIZE=$((AVAILABLE_MEM - 1))
          if [ $HEAP_SIZE -gt 4 ]; then HEAP_SIZE=4; fi
          if [ $HEAP_SIZE -lt 2 ]; then HEAP_SIZE=2; fi
          
          echo "Using ${HEAP_SIZE}G RAM"
          
          # Start server with repo files
          java -Xms${HEAP_SIZE}G \
               -Xmx${HEAP_SIZE}G \
               -XX:+UseG1GC \
               -jar spigot.jar nogui < server.stdin 2>&1 | tee server.log &
          SERVER_PID=$!
          
          # Wait for server to start
          sleep 30
          
          # Initial save
          ./save-world.sh "STARTUP"
          
          # Auto-save loop (every 10 minutes)
          (
            while true; do
              sleep 600  # 10 minutes
              ./save-world.sh "AUTO-SAVE"
            done
          ) &
          SAVE_LOOP_PID=$!
          
          # Monitor server
          while true; do
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "⚠️ Server died, saving and exiting..."
              ./save-world.sh "CRASH"
              break
            fi
            sleep 30
          done
          
          # Cleanup
          kill $SAVE_LOOP_PID 2>/dev/null || true
          kill $PLAYIT_PID 2>/dev/null || true
          
          # Final save
          ./save-world.sh "SHUTDOWN"
      
      # Upload logs
      - name: Upload logs
        run: |
          name: server-logs
          path: |
            server.log
            playit.log
            logs/
